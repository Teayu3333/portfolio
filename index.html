<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <meta name="description" content="GitHub Portfolio">

  <!-- OGP -->
  <meta property="og:type"  content="website">
  <meta property="og:title" content="Portfolio">

  <!-- Font Awesome（ソーシャルリンクのアイコン用） -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header id="site-header"></header>

  <!-- ヒーロー -->
  <section id="hero"></section>

  <!-- 作品 -->
  <section id="projects-section">
    <div class="container">
      <h2 class="section-title">📦 作品</h2>
      <div id="projects-container">
        <!-- JS で動的生成 -->
      </div>
    </div>
  </section>

  <!-- フッター -->
  <footer>
    <div class="container">
      <p>Built with ♥ · <a href="https://github.com" target="_blank" rel="noopener">GitHub</a></p>
    </div>
  </footer>

  <!-- ライブプレビューモーダル -->
  <div id="modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <span id="modal-title" class="modal-title"></span>
        <div class="modal-actions">
          <a id="modal-open-btn" href="#" target="_blank" rel="noopener" class="btn-sm" style="text-decoration:none">
            ↗ 別タブで開く
          </a>
          <button class="btn-icon" onclick="closeModal()" title="閉じる">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <div id="modal-loading" class="modal-loading">
          <div class="spinner"></div>
          <span>読み込み中...</span>
        </div>
        <iframe id="modal-iframe"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
          style="display:none"
          title="Project preview">
        </iframe>
      </div>
    </div>
  </div>

  <!-- 設定ファイル（先に読み込む） -->
  <script src="config.js"></script>
  <!-- アプリ本体 -->
  <script src="js/app.js"></script>
</body>
</html>
